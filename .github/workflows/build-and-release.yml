name: Build and Release Inno Setup Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get newest Weasel installer by published date
        id: weasel
        shell: pwsh
        run: |
          $repo = "rime/weasel"
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $allReleases = @()
          $page = 1

          while ($true) {
            $url = "https://api.github.com/repos/$repo/releases?per_page=100&page=$page"
            Write-Host "Fetching: $url"
            $batch = Invoke-RestMethod -Uri $url -Headers $headers

            if (-not $batch -or $batch.Count -eq 0) {
              break
            }

            $allReleases += $batch
            $page++
          }

          if (-not $allReleases -or $allReleases.Count -eq 0) {
            Write-Error "No releases found for $repo"
            exit 1
          }

          $sortedReleases = $allReleases | Sort-Object {
            [datetime]$_.published_at
          } -Descending

          $selectedRelease = $null
          $selectedAsset = $null

          foreach ($release in $sortedReleases) {
            if (-not $release.assets -or $release.assets.Count -eq 0) {
              continue
            }

            $asset = $release.assets | Where-Object {
              $_.name -match '^weasel-[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(?:\.[A-Za-z0-9]+)?-installer\.exe$'
            } | Select-Object -First 1

            if ($asset) {
              $selectedRelease = $release
              $selectedAsset = $asset
              break
            }
          }

          if (-not $selectedRelease -or -not $selectedAsset) {
            Write-Error "No matching weasel installer exe found in releases."
            exit 1
          }

          $assetName = $selectedAsset.name
          $assetUrl = $selectedAsset.browser_download_url
          $publishedAt = $selectedRelease.published_at
          $releaseTag = $selectedRelease.tag_name
          $releaseName = $selectedRelease.name

          Write-Host "Selected release: $releaseName"
          Write-Host "Selected tag: $releaseTag"
          Write-Host "Published at: $publishedAt"
          Write-Host "Selected asset: $assetName"
          Write-Host "Download URL: $assetUrl"

          $appVersion = ""
          if ($assetName -match '^weasel-([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)(?:\.[A-Za-z0-9]+)?-installer\.exe$') {
            $appVersion = $matches[1]
          }

          if ([string]::IsNullOrWhiteSpace($appVersion)) {
            Write-Error "Failed to extract app version from asset name: $assetName"
            exit 1
          }

          $buildKind = "stable"
          if ($assetName -match '^weasel-[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\.[A-Za-z0-9]+-installer\.exe$') {
            $buildKind = "nightly"
          }

          $dt = [datetime]$publishedAt
          $runNumber = $env:GITHUB_RUN_NUMBER
          $siVersion = "{0}.{1}.{2}.{3}" -f ($dt.ToString("yy")), $dt.Month, $dt.Day, $runNumber

          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "asset_url=$assetUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "si_version=$siVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "published_at=$publishedAt" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "build_kind=$buildKind" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download latest Weasel installer to repo root
        shell: pwsh
        run: |
          $url = "${{ steps.weasel.outputs.asset_url }}"
          $name = "${{ steps.weasel.outputs.asset_name }}"
          Invoke-WebRequest -Uri $url -OutFile $name
          Write-Host "Downloaded to: $name"
          Get-ChildItem .

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )

          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            Write-Error "ISCC.exe not found"
            exit 1
          }

          Write-Host "ISCC found at: $iscc"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )

          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            Write-Error "ISCC.exe not found"
            exit 1
          }

          $script = "install_script.iss"

          if (!(Test-Path $script)) {
            Write-Error "Inno Setup script not found: $script"
            exit 1
          }

          & $iscc `
            "/DOriginalSetupName=${{ steps.weasel.outputs.asset_name }}" `
            "/DAppVersion=${{ steps.weasel.outputs.app_version }}" `
            "/DSIVersion=${{ steps.weasel.outputs.si_version }}" `
            $script

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup build failed."
            exit 1
          }

          Write-Host "Build output:"
          Get-ChildItem -File *.exe

      - name: Find built installer
        id: built
        shell: pwsh
        run: |
          $sourceName = "${{ steps.weasel.outputs.asset_name }}"

          $file = Get-ChildItem -File *.exe | Where-Object {
            $_.Name -ne $sourceName
          } | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $file) {
            Write-Error "Built installer not found."
            exit 1
          }

          Write-Host "Built file: $($file.Name)"
          "file_name=$($file.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "file_path=$($file.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.weasel.outputs.si_version }}.${{ github.run_number }}
          name: weasel_simplified_installer ${{ steps.weasel.outputs.si_version }}.${{ github.run_number }}
          body_path: README.md
          draft: false
          prerelease: false
          files: |
            ${{ steps.built.outputs.file_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
